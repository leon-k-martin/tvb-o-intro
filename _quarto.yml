# TVB-O Lecture — standalone reveal.js slide deck
project:
  type: default
  render:
    - index.qmd

# Default build is Python-free: `quarto render` uses the committed _freeze/ cache.
# Everything needed to reproduce from source is in the repo too — the render data
# (_dev/) and the env (requirements.txt) — so `make repro` re-executes every cell.
execute:
  freeze: true

bibliography: bibliography.bib
